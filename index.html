<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дни Рождения Клуба 22</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1826;
    --surface2: #231f35;
    --accent: #ff6b6b;
    --accent2: #ffd166;
    --accent3: #a29bfe;
    --text: #fffffe;
    --muted: #a7a9be;
    --border: rgba(255,255,255,0.07);
    --progress-bg: rgba(255,255,255,0.06);
  }

  [data-theme="light"] {
    --bg: #faf7f2;
    --surface: #ffffff;
    --surface2: #f2ece3;
    --accent: #e05a5a;
    --accent2: #c9922a;
    --accent3: #6c63c9;
    --text: #2c2825;
    --muted: #8a8178;
    --border: rgba(120,100,80,0.12);
    --progress-bg: rgba(120,100,80,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  [data-theme="dark"] body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 80%; height: 80%;
    background: radial-gradient(ellipse, rgba(162,155,254,0.12) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  [data-theme="dark"] body::after {
    content: '';
    position: fixed;
    bottom: -40%; right: -20%;
    width: 70%; height: 70%;
    background: radial-gradient(ellipse, rgba(255,107,107,0.1) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  [data-theme="light"] body::before {
    content: '';
    position: fixed;
    top: -30%; left: -10%;
    width: 70%; height: 70%;
    background: radial-gradient(ellipse, rgba(201,146,42,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  [data-theme="light"] body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -10%;
    width: 60%; height: 60%;
    background: radial-gradient(ellipse, rgba(108,99,201,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: 20px; right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 1rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    transition: all 0.2s;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .theme-toggle:hover { border-color: var(--accent3); color: var(--text); }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.7s ease both;
  }
  .header-eyebrow {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--accent3);
    margin-bottom: 10px;
    font-weight: 500;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .gradient {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .italic { font-style: italic; font-weight: 400; }
  header p { color: var(--muted); margin-top: 10px; font-size: 0.9rem; font-weight: 300; }

  /* Birthday card overlay */
  #bday-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: linear-gradient(160deg, #0d0020 0%, #1a0a2e 40%, #2d1040 100%);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px 24px;
    overflow-y: auto;
    animation: fadeIn 0.6s ease;
  }
  #bday-overlay.show { display: flex; }

  .overlay-avatar {
    width: 100px; height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,209,102,0.5);
    margin-bottom: 20px;
    animation: avatarPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    box-shadow: 0 0 30px rgba(255,209,102,0.3);
  }
  .overlay-avatar-placeholder {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    border: 3px solid rgba(255,209,102,0.4);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem; font-weight: 900; color: white;
    margin-bottom: 20px;
    animation: avatarPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    box-shadow: 0 0 30px rgba(162,155,254,0.4);
  }

  .bday-overlay-emoji { font-size: 3.5rem; margin-bottom: 10px; animation: bounce 1s ease infinite alternate; }
  .bday-overlay-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #ffd166, #ff6b6b, #a29bfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .bday-overlay-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 900;
    color: white;
    margin-bottom: 20px;
  }

  /* AI greeting box */
  .ai-greeting-box {
    background: linear-gradient(135deg, rgba(108,92,231,0.15), rgba(162,155,254,0.08));
    border: 1px solid rgba(162,155,254,0.2);
    border-radius: 20px;
    padding: 20px 24px;
    max-width: 400px;
    width: 100%;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
    box-sizing: border-box;
  }
  .ai-greeting-box .ai-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: rgba(162,155,254,0.6);
    font-style: normal;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ai-greeting-box .ai-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: #a29bfe;
    border-radius: 50%;
    animation: pulseDot 1.5s ease-in-out infinite;
  }
  .ai-greeting-text-wrap {
    font-size: 0.92rem;
    color: rgba(255,255,255,0.88);
    line-height: 1.7;
    font-style: italic;
    font-family: 'Playfair Display', serif;
    font-weight: 400;
  }
  .ai-typing::after {
    content: '▋';
    animation: blink 0.7s step-end infinite;
    color: #a29bfe;
    font-style: normal;
  }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes pulseDot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }

  /* Music player */
  .music-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    padding: 10px 18px;
    max-width: 420px; width: 100%;
    margin-bottom: 24px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .music-bar:hover { background: rgba(255,255,255,0.1); }
  .music-icon { font-size: 1.2rem; flex-shrink: 0; }
  .music-info { flex: 1; text-align: left; }
  .music-title { font-size: 0.82rem; color: white; font-weight: 500; }
  .music-sub   { font-size: 0.72rem; color: rgba(255,255,255,0.4); }
  .music-play  { font-size: 1rem; color: rgba(255,255,255,0.6); }
  .music-bar.playing .music-icon { animation: musicBounce 0.6s ease infinite alternate; }
  @keyframes musicBounce { from { transform: scale(1); } to { transform: scale(1.3) rotate(10deg); } }

  .bday-overlay-close {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    padding: 11px 32px;
    color: rgba(255,255,255,0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .bday-overlay-close:hover { background: rgba(255,255,255,0.15); color: white; }

  .confetti { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
  .confetti-piece {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confettiFall linear infinite;
    opacity: 0;
  }

  @keyframes avatarPop {
    from { transform: scale(0) rotate(-15deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);  opacity: 1; }
  }

  /* Countdown banner */
  #next-banner {
    background: linear-gradient(135deg, var(--surface2), var(--surface));
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    animation: fadeDown 0.7s 0.1s ease both;
  }
  #next-banner .emoji { font-size: 2rem; flex-shrink: 0; }
  #next-banner .info { flex: 1; }
  #next-banner .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  #next-banner .name { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; margin: 2px 0; }
  #next-banner .days { font-size: 0.9rem; color: var(--accent2); }

  /* Countdown timer */
  #countdown-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 24px;
    margin-bottom: 32px;
    display: flex;
    justify-content: center;
    gap: 6px;
    animation: fadeDown 0.7s 0.15s ease both;
  }
  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 56px;
  }
  .cd-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--accent3);
    line-height: 1;
    transition: color 0.3s;
  }
  .cd-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-top: 4px;
  }
  .cd-sep {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--border);
    align-self: flex-start;
    margin-top: 4px;
    padding: 0 2px;
  }

  /* Month group */
  .month-group { margin-bottom: 28px; animation: fadeUp 0.5s ease both; }
  .month-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent3);
    font-weight: 500;
    margin-bottom: 10px;
    padding-left: 4px;
  }

  .bday-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
    transition: border-color 0.2s, transform 0.2s;
    cursor: default;
  }
  .bday-card:hover { border-color: rgba(162,155,254,0.3); transform: translateY(-2px); }
  .bday-card.today { border-color: var(--accent2); background: linear-gradient(135deg, rgba(255,209,102,0.08), var(--surface)); cursor: pointer; }

  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1rem;
    transition: background 0.3s, color 0.3s;
  }

  .bday-info { flex: 1; min-width: 0; }
  .bday-name { font-weight: 500; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bday-date { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  /* Progress bar — wave style */
  .progress-wrap { margin-top: 8px; display: flex; align-items: center; gap: 8px; }

  .progress-bar {
    flex: 1;
    height: 20px;
    background: var(--progress-bg);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    position: absolute;
    left: 0; top: 0;
    height: 100%;
    border-radius: 20px;
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }

  /* The liquid colour layer */
  .progress-fill .wave-liquid {
    position: absolute;
    inset: 0;
    border-radius: 20px;
  }

  /* SVG wave sitting on top of liquid */
  .progress-fill .wave-svg {
    position: absolute;
    bottom: 0;
    left: -100%;
    width: 300%;
    height: 100%;
    opacity: 0.35;
  }
  .progress-fill .wave-svg2 {
    position: absolute;
    bottom: 0;
    left: -100%;
    width: 300%;
    height: 100%;
    opacity: 0.2;
  }

  .progress-fill.wave-anim .wave-svg  { animation: waveScroll 2.4s linear infinite; }
  .progress-fill.wave-anim .wave-svg2 { animation: waveScroll 3.8s linear infinite reverse; }

  /* drop bubble at the tip */
  .progress-fill::after {
    content: '';
    position: absolute;
    right: 2px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    background: rgba(255,255,255,0.5);
    animation: dropBob 1.6s ease-in-out infinite alternate;
  }

  .progress-days { font-size: 0.72rem; color: var(--muted); flex-shrink: 0; white-space: nowrap; }

  /* colour themes by urgency */
  .progress-fill.wave-calm .wave-liquid { background: linear-gradient(90deg, #74b9ff, #a29bfe); }
  .progress-fill.wave-calm .wave-svg path,
  .progress-fill.wave-calm .wave-svg2 path { fill: #ffffff; }
  .progress-fill.wave-calm::after { background: rgba(162,155,254,0.6); }

  .progress-fill.wave-warm .wave-liquid { background: linear-gradient(90deg, #ffeaa7, #fdcb6e); }
  .progress-fill.wave-warm .wave-svg path,
  .progress-fill.wave-warm .wave-svg2 path { fill: #ffffff; }
  .progress-fill.wave-warm::after { background: rgba(253,203,110,0.7); }

  .progress-fill.wave-hot .wave-liquid { background: linear-gradient(90deg, #fd79a8, #e17055); }
  .progress-fill.wave-hot .wave-svg path,
  .progress-fill.wave-hot .wave-svg2 path { fill: #ffffff; }
  .progress-fill.wave-hot::after { background: rgba(255,118,117,0.7); }

  .progress-fill.wave-surge .wave-liquid { background: linear-gradient(90deg, #6c5ce7, #a29bfe, #74b9ff); }
  .progress-fill.wave-surge .wave-svg path,
  .progress-fill.wave-surge .wave-svg2 path { fill: #ffffff; }
  .progress-fill.wave-surge::after {
    background: rgba(255,255,255,0.8);
    animation: dropBob 0.8s ease-in-out infinite alternate, surgePulse 1s ease-in-out infinite alternate;
  }

  @keyframes waveScroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(33.33%); }
  }
  @keyframes dropBob {
    from { transform: translateY(-55%) scale(0.9); }
    to   { transform: translateY(-45%) scale(1.1); }
  }
  @keyframes surgePulse {
    from { box-shadow: 0 0 4px 2px rgba(162,155,254,0.4); }
    to   { box-shadow: 0 0 10px 5px rgba(162,155,254,0.7); }
  }

  .days-chip {
    padding: 4px 11px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .days-chip.soon   { background: rgba(255,107,107,0.15); color: var(--accent); }
  .days-chip.medium { background: rgba(255,209,102,0.15); color: var(--accent2); }
  .days-chip.far    { background: rgba(162,155,254,0.1);  color: var(--accent3); }
  .days-chip.today-chip { background: var(--accent2); color: #0f0e17; font-weight: 700; }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(10px);  } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
  @keyframes bounce   { from { transform: scale(1) rotate(-5deg); } to { transform: scale(1.15) rotate(5deg); } }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 480px) {
    .cd-unit { min-width: 46px; }
    .cd-num  { font-size: 1.5rem; }
    .theme-toggle span { display: none; }
  }
</style>
</head>

</div>

  { name: '@Randepuk',           realName: 'Юра',      gender: 'm', m: 3,  d: 18 },
  { name: '@Marussiaspring',     realName: 'Маруся',   gender: 'f', m: 4,  d: 17 },
  { name: '@yesley',             realName: 'Ярик',     gender: 'm', m: 5,  d: 4  },
];

const MONTHS_RU    = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_SHORT = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const COLORS_DARK = [
  ['#ff6b6b','#2a1a1a'],['#ffd166','#2a2410'],['#a29bfe','#1e1a30'],
  ['#55efc4','#0f2620'],['#fd79a8','#2a1020'],['#74b9ff','#101e2a'],
  ['#e17055','#251510'],['#00b894','#0a2018']
];
const COLORS_LIGHT = [
  ['#c0392b','#fdecea'],['#a0720a','#fef6e4'],['#5649b0','#eeecfb'],
  ['#0e8a66','#e4f7f2'],['#b83272','#fceef5'],['#1a6fb5','#e5f1fb'],
  ['#b0440e','#fdeee8'],['#0a7a5a','#e4f5ef']
];
function getColors(idx) {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  return isLight ? COLORS_LIGHT[idx % COLORS_LIGHT.length] : COLORS_DARK[idx % COLORS_DARK.length];
}

function todayFlat() {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}

function daysUntil(m, d) {
  const tf = todayFlat();
  let next = new Date(tf.getFullYear(), m - 1, d);
  if (next < tf) next = new Date(tf.getFullYear() + 1, m - 1, d);
  return Math.round((next - tf) / 86400000);
}

function nextBirthdayDate(m, d) {
  const tf = todayFlat();
  let next = new Date(tf.getFullYear(), m - 1, d);
  if (next < tf) next = new Date(tf.getFullYear() + 1, m - 1, d);
  return next;
}

function chipClass(days) {
  if (days === 0) return 'today-chip';
  if (days <= 14)  return 'soon';
  if (days <= 60)  return 'medium';
  return 'far';
}
function chipText(days) {
  if (days === 0) return '🎂 Сегодня!';
  if (days === 1) return 'Завтра!';
  return `через ${days} д.`;
}
function initials(name) { return name.replace('@','').slice(0,2).toUpperCase(); }

// Progress: % of year elapsed since last birthday toward next
function progressPercent(m, d) {
  const tf = todayFlat();
  const days = daysUntil(m, d);
  if (days === 0) return 100;
  return Math.round(((365 - days) / 365) * 100);
}

// ---- Countdown ----
let countdownTarget = null;

function updateCountdown() {
  if (!countdownTarget) return;
  const now = new Date();
  const diff = countdownTarget - now;
  if (diff <= 0) {
    ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '00');
    return;
  }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const min = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('cd-d').textContent = String(d).padStart(2,'0');
  document.getElementById('cd-h').textContent = String(h).padStart(2,'0');
  document.getElementById('cd-m').textContent = String(min).padStart(2,'0');
  document.getElementById('cd-s').textContent = String(s).padStart(2,'0');
}

// ---- Theme ----
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-icon').textContent  = isDark ? '🌙' : '☀️';
  document.getElementById('theme-label').textContent = isDark ? 'Тёмная' : 'Светлая';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
  render();
}

// ---- Confetti ----
function spawnConfetti() {
  const box = document.getElementById('confetti');
  box.innerHTML = '';
  const colors = ['#ffd166','#ff6b6b','#a29bfe','#55efc4','#fd79a8','#74b9ff'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${4+Math.random()*8}px;
      height: ${4+Math.random()*8}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${2+Math.random()*3}s;
      animation-delay: ${Math.random()*2}s;
      opacity: 0;
    `;
    box.appendChild(el);
  }
}

function closeOverlay() {
  document.getElementById('bday-overlay').classList.remove('show');
  stopMusic();
}

// ---- AI Greeting ----
const GREETINGS = [
  (n, g) => n + (g==="f" ? ", ты — одна из тех людей" : ", ты — один из тех людей") + ", кто делает наш чат особенным. Пусть этот день будет таким же ярким, как ты " + (g==="f" ? "сама" : "сам") + "! 🌟",
  (n, g) => "Сегодня вся вселенная чуть счастливее, потому что " + n + " появил" + (g==="f" ? "ась" : "ся") + " на свет. Чат 22 тебя крепко обнимает! 🫂",
  (n, g) => n + ", каждый год с тобой — это новая глава лучшей книги. Пусть этот год будет самым крутым из всех! 📖✨",
  (n, g) => "Сегодня " + (g==="f" ? "именинница" : "именинник") + " — " + n + "! Пусть в этот день всё складывается именно так, как ты хочешь. Чат 22 рядом! 🎉",
  (n, g) => n + ", ты — причина, почему сегодня все в чате 22 улыбаются чуть шире. С днём рождения, " + (g==="f" ? "дорогая" : "дорогой") + "! 🎂",
  (n, g) => n + ", пусть этот день принесёт столько радости, сколько ты даришь нам каждый день. С днём рождения, " + (g==="f" ? "родная" : "родной") + "! 🥂",
];


let audioCtx = null;
let isPlaying = false;
let musicNodes = [];

function showOverlay(name, realName, gender) {
  const displayName = realName || name;

  // Avatar placeholder with initials
  const wrap = document.getElementById('overlay-avatar-wrap');
  const ini = displayName.slice(0,2).toUpperCase();
  wrap.innerHTML = `<div class="overlay-avatar-placeholder">${ini}</div>`;

  // AI greeting — pick random, type it out
  const fn = GREETINGS[Math.floor(Math.random() * GREETINGS.length)];
  const greeting = fn(displayName, gender || 'm');
  const el = document.getElementById('ai-greeting-text');
  el.textContent = '';
  el.classList.add('ai-typing');
  let i = 0;
  const timer = setInterval(() => {
    el.textContent += greeting[i++];
    if (i >= greeting.length) { clearInterval(timer); el.classList.remove('ai-typing'); }
  }, 28);



  // Show real name big, nick small below
  document.getElementById('overlay-name').innerHTML = realName
    ? `${realName}<div style="font-size:0.9rem;font-weight:400;opacity:0.45;font-family:'DM Sans',sans-serif;margin-top:4px">${name}</div>`
    : name;

  spawnConfetti();
  document.getElementById('bday-overlay').classList.add('show');

  // Auto-play music
  playHappyBirthday();
}


// ---- Music (Web Audio API — Happy Birthday melody) ----
const NOTES = {
  G4:392, A4:440, B4:494, C5:523, D5:587, E5:659, F5:698,
  G5:784, A5:880, Bb4:466, Bb5:932
};
const MELODY = [
  ['G4',0.5],['G4',0.25],['A4',0.75],['G4',0.75],['C5',0.75],['B4',1.5],
  ['G4',0.5],['G4',0.25],['A4',0.75],['G4',0.75],['D5',0.75],['C5',1.5],
  ['G4',0.5],['G4',0.25],['G5',0.75],['E5',0.75],['C5',0.75],['B4',0.75],['A4',1.0],
  ['F5',0.5],['F5',0.25],['E5',0.75],['C5',0.75],['D5',0.75],['C5',1.5],
];

function playHappyBirthday() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    stopMusic();
    isPlaying = true;
    document.getElementById('music-bar').classList.add('playing');
    document.getElementById('music-play-icon').textContent = '⏸';
    document.querySelector('.music-sub').textContent = 'Играет 🎶';

    const tempo = 0.42;
    let t = audioCtx.currentTime + 0.1;
    musicNodes = [];

    MELODY.forEach(([note, dur]) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = NOTES[note];
      const d = dur * tempo;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
      gain.gain.linearRampToValueAtTime(0.12, t + d * 0.7);
      gain.gain.linearRampToValueAtTime(0, t + d - 0.02);
      osc.start(t); osc.stop(t + d);
      musicNodes.push(osc);
      t += d;
    });

    // reset after song ends
    setTimeout(() => {
      if (isPlaying) {
        isPlaying = false;
        const bar = document.getElementById('music-bar');
        if (bar) { bar.classList.remove('playing'); }
        const icon = document.getElementById('music-play-icon');
        if (icon) icon.textContent = '▶';
        const sub = document.querySelector('.music-sub');
        if (sub) sub.textContent = 'Нажми чтобы сыграть снова';
      }
    }, (t - audioCtx.currentTime + 0.3) * 1000);
  } catch(e) { console.log('Audio not available'); }
}

function stopMusic() {
  if (!isPlaying) return;
  isPlaying = false;
  musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
  musicNodes = [];
  const bar = document.getElementById('music-bar');
  if (bar) bar.classList.remove('playing');
  const icon = document.getElementById('music-play-icon');
  if (icon) icon.textContent = '▶';
  const sub = document.querySelector('.music-sub');
  if (sub) sub.textContent = 'Нажми чтобы сыграть';
}

function toggleMusic() {
  if (isPlaying) stopMusic(); else playHappyBirthday();
}


// ---- Render ----
function render() {
  const people = PEOPLE.map((p, i) => ({ ...p, days: daysUntil(p.m, p.d), idx: i }));
  const sorted = [...people].sort((a,b) => a.days - b.days);
  const next = sorted[0];

  // Banner
  document.getElementById('next-name').textContent = next.name;
  document.getElementById('next-days').textContent =
    next.days === 0 ? '🎂 Сегодня!' :
    next.days === 1 ? 'Уже завтра!' :
    `Через ${next.days} дней · ${next.d} ${MONTHS_SHORT[next.m-1]}`;

  // Countdown target = midnight of next birthday
  countdownTarget = nextBirthdayDate(next.m, next.d);
  updateCountdown();

  // Birthday overlay
  const todays = people.filter(p => p.days === 0);
  if (todays.length > 0) {
    const p0 = todays[0];
    showOverlay(p0.name, p0.realName, p0.gender);
  }

  // Month groups
  const todayMonth = new Date().getMonth() + 1;
  const monthOrder = Array.from({length:12}, (_,i) => ((todayMonth-1+i)%12)+1);
  const byMonth = {};
  people.forEach(p => { (byMonth[p.m] = byMonth[p.m]||[]).push(p); });
  Object.keys(byMonth).forEach(m => byMonth[m].sort((a,b) => a.d - b.d));

  const list = document.getElementById('birthday-list');
  list.innerHTML = '';

  monthOrder.forEach((m, gi) => {
    if (!byMonth[m]) return;
    const group = document.createElement('div');
    group.className = 'month-group';
    group.style.animationDelay = `${0.05*gi}s`;

    const label = document.createElement('div');
    label.className = 'month-label';
    label.textContent = MONTHS_RU[m-1];
    group.appendChild(label);

    byMonth[m].forEach(p => {
      const [fg, bg] = getColors(p.idx);
      const pct = progressPercent(p.m, p.d);
      const isToday = p.days === 0;

      // wave urgency class
      let waveClass = 'wave-calm';
      let waveLabel = p.days + ' д.';
      if      (p.days === 0)      { waveClass = 'wave-surge'; waveLabel = '🌊 Сегодня!'; }
      else if (p.days <= 7)       { waveClass = 'wave-surge'; waveLabel = '🌊 ' + p.days + ' д.'; }
      else if (p.days <= 30)      { waveClass = 'wave-hot';   waveLabel = p.days + ' д.'; }
      else if (p.days <= 90)      { waveClass = 'wave-warm';  waveLabel = p.days + ' д.'; }
      else                        { waveClass = 'wave-calm';  waveLabel = p.days + ' д.'; }

      // wave SVG path
      const wavePath = `<svg class="wave-svg" viewBox="0 0 300 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path d="M0,10 C20,2 40,18 60,10 C80,2 100,18 120,10 C140,2 160,18 180,10 C200,2 220,18 240,10 C260,2 280,18 300,10 L300,20 L0,20 Z"/></svg>`;
      const wavePath2 = `<svg class="wave-svg2" viewBox="0 0 300 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path d="M0,12 C25,4 50,20 75,12 C100,4 125,20 150,12 C175,4 200,20 225,12 C250,4 275,20 300,12 L300,20 L0,20 Z"/></svg>`;

      const card = document.createElement('div');
      card.className = 'bday-card' + (isToday ? ' today' : '');
      if (isToday) card.onclick = () => { showOverlay(p.name, p.realName, p.gender); };

      card.innerHTML = `
        <div class="avatar" style="background:${bg};color:${fg}">${initials(p.name)}</div>
        <div class="bday-info">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
            <div class="bday-name">${p.name}</div>
            <div class="days-chip ${chipClass(p.days)}">${chipText(p.days)}</div>
          </div>
          <div class="bday-date">${p.d} ${MONTHS_SHORT[p.m-1]}</div>
          <div class="progress-wrap">
            <div class="progress-bar">
              <div class="progress-fill ${waveClass} wave-anim" style="width:${pct}%">
                <div class="wave-liquid"></div>
                ${wavePath}
                ${wavePath2}
              </div>
            </div>
            <div class="progress-days">${waveLabel}</div>
          </div>
        </div>
      `;
      group.appendChild(card);
    });

    list.appendChild(group);
  });
}

// Restore theme
const saved = localStorage.getItem('theme');
if (saved === 'light') {
  document.documentElement.setAttribute('data-theme','light');
  document.getElementById('theme-icon').textContent  = '🌙';
  document.getElementById('theme-label').textContent = 'Тёмная';
}

render();
setInterval(updateCountdown, 1000);
</script>
